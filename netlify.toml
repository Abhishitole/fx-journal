[build]
  command = "npm run build"
  publish = "dist"

# Standard client-side routing fallback rule for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control for assets and styles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
